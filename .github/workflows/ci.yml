name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install jq (for e2e)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Inspect — tool registration
        run: |
          COUNT=$(npx -y @modelcontextprotocol/inspector --cli node dist/src/mcp/server.js --method tools/list \
                 | python3 -c "import json,sys; print(len(json.load(sys.stdin)['tools']))")
          echo "tools registered: $COUNT"
          [ "$COUNT" -ge 20 ] || { echo "expected ≥20 tools"; exit 1; }

      - name: Inspect — prompt registration
        run: |
          COUNT=$(npx -y @modelcontextprotocol/inspector --cli node dist/src/mcp/server.js --method prompts/list \
                 | python3 -c "import json,sys; print(len(json.load(sys.stdin)['prompts']))")
          echo "prompts registered: $COUNT"
          [ "$COUNT" -ge 10 ] || { echo "expected ≥10 prompts"; exit 1; }

      - name: E2E (state machine + retrieval + threads + ops)
        run: bash scripts/e2e.sh

      - name: Pack check (publish dry-run)
        run: npm pack --dry-run
